        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }

        img {
            height: 350px;
            width: 200px;
        }

        .container-wrapper {
            perspective: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 200px;
            height: 350px;
            position: relative;
            transform-style: preserve-3d;
            animation: gallery 20s linear infinite;
            cursor: pointer;
        }

        .container span {
            position: absolute;
            transform-origin: center;
            transform: rotateY(calc(var(--i) * 90deg)) translateZ(300px);
        }

        @keyframes gallery {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        
        }
        @keyframes animate {
    0%{
        transform: translateY(0) rotate(0deg);
        opacity: 1;
        border-radius: 0;
    }
    100%{
        transform: translateY(-1000px) rotate(720deg);
        opacity: 0;
        border-radius: 50%;
    }
}

    <script>
        let angle = 0;
        let autoRotate;

        function startRotation() {
            autoRotate = setInterval(() => {
                angle -= 90;
                document.querySelector('.container').style.transform = `rotateY(${angle}deg)`;
            }, 3000);
        }

        function stopRotation() {
            clearInterval(autoRotate);
        }

        document.querySelector('.container').addEventListener('click', () => {
            if (autoRotate) {
                stopRotation();
                autoRotate = null;
            } else {
                startRotation();
            }
        });

        startRotation();
